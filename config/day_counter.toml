		Message = ""
		Command = ""
		EXP = 0.0
		Item = ""
		"Item Count" = 0.0

	[Rewards.4]
		Day = 0.0
		Message = ""
		Command = ""
		EXP = 0.0
		Item = ""
		"Item Count" = 0.0

	[Rewards.5]
		Day = 0.0
		Message = ""
		Command = ""
		EXP = 0.0
		Item = ""
		"Item Count" = 0.0

