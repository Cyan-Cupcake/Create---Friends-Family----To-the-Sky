[Help]
	"Color Code" = "https://cdn.modrinth.com/data/sgFIOK5w/images/0f4a0e5a3c73f7d095421ee496236b5c9afacc05.png"
	"For the Title text" = "https://minecraft.tools/en/tellraw.php?tellraw=Welcome%20to%20Minecraft%20Tools&selector=%40a"
	"Available variables" = "%date_year%, %date_month%, %date_day%, %player_days%, %server_days%"

	[UI."New Day Text"]
		#Here you can disable or enable that when a player joins it shows them the current day.
		Enabled = true
		#You can choose how to display the new day text. You can choose between: title, subtitle, chat, actionbar, disabled
		Display = "title"
		#You can customize the texts here. Every text except Title Text what use JSON is using normal color codes.
		"Title Text" = "[\"\",{\"text\":\"%server_days%\",\"bold\":true,\"color\":\"gold\"},{\"text\":\". Day\",\"bold\":true}]"
		"Subtitle Text" = "[\"\",{\"text\":\"(\",\"bold\":true},{\"text\":\"%date_day%\",\"bold\":true,\"color\":\"gold\"},{\"text\":\"/\",\"bold\":true,\"color\":\"aqua\"},{\"text\":\"%date_month%\",\"bold\":true,\"color\":\"gold\"},{\"text\":\"/\",\"bold\":true,\"color\":\"aqua\"},{\"text\":\"%date_year%\",\"bold\":true,\"color\":\"gold\"},{\"text\":\")\",\"bold\":true}]"
		"ActionBar Text" = "§f§lA new day has come! Today is the §6§l$server_days$§f§l."

	[UI."Disabled Feature Text"]
		#You can enable or disable the this feature is disabled text.
		Enabled = true
		"Disabled Feature Text" = "§6§l[§b§lDay Counter§6§l] §fThis feature is §c§ldisabled §fin the config!"

	[UI.Text]
		#Here you can set what text should appear on the scoreboard or below the player neme text to day number.
		Text = "§6§lDays"

	[UI.Scoreboard]
		#You can enable or disable to show the days on the Scoreboard.
		Enabled = true

	[UI.Playerlist]
		#You can enable or disable to show the days on the Playerlist.
		Enabled = true

	[UI.Name]
		#You can enable or disable to show the days below the player name.
		Enabled = true

[Sound]
	#You can enable or disable the sound effect on new day.
	Enabled = true

[Block]
	#You can enable or disable the calendar block or change the block to a other one.
	Enabled = true
	#Here you can configure which block should be the calendar block.
	Block = "ags_day_counter:calendar"

[Item]
	#You can enable or disable the right click with calendar item.
	Enabled = true
	#Here you can configure which item should be the calendar item.
	Item = "ags_day_counter:calendar_item"

[Days]
	#You can choose which day(s) to show on texts and which day should the system watch for the Rewards. You can choose between: player, server
	Use = "server"

[Date]
	#You can disable or enable the Date system here.
	Enabled = true
	#Here you can set the default values of the year/month/day.
	Day = 1.0
	Month = 1.0
	Year = 2000.0

	[Rewards.Example]
		#Here you can set at which Day should the reward trigger.
		Day = 0.0
		#Here you can set a Chat Message that will be send to the player.
		Message = "§6§l[§b§lDay Counter§6§l] §fCongratulations for reaching this specific day!"
		#Here you can set a Command that will be triggered. Available variables: $player$
		Command = "effect give $player$ minecraft:glowing infinitefect give player$ minecraft:glowing infinite"
		#Here you can set an EXP amount that will be given to the player.
		EXP = 300.0
		#Here you can set an Item that will be given to the player.
		Item = "minecraft:diamond_block"
		#Here you can set the Amount of the Item what will be given to the player.
		"Item Count" = 25.0

	[Rewards.1]
		Day = 0.0
		Message = ""
		Command = ""
		EXP = 0.0
		Item = ""
		"Item Count" = 0.0

	[Rewards.2]
		Day = 0.0
		Message = ""
		Command = ""
		EXP = 0.0
		Item = ""
		"Item Count" = 0.0

	[Rewards.3]
